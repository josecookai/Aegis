name: Issue Dispatch

on:
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

jobs:
  dispatch:
    if: >
      (github.event_name == 'issues' && github.event.action == 'opened') ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'dispatch') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request == null && contains(github.event.comment.body, '/dispatch'))
    runs-on: ubuntu-latest
    steps:
      - name: Compute branch
        id: vars
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          TITLE="${{ github.event.issue.title }}"
          SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]\+/-/g' | sed 's/^-//;s/-$//' | cut -c1-40)
          if [ -z "$SLUG" ]; then SLUG="task"; fi
          echo "branch=codex/issue-${ISSUE_NUMBER}-${SLUG}" >> "$GITHUB_OUTPUT"

      - name: Create branch if missing
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = '${{ steps.vars.outputs.branch }}';

            const defaultBranch = (await github.rest.repos.get({ owner, repo })).data.default_branch;
            const baseRef = await github.rest.git.getRef({ owner, repo, ref: `heads/${defaultBranch}` });

            try {
              await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
              core.info(`Branch already exists: ${branch}`);
            } catch (e) {
              if (e.status !== 404) throw e;
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: baseRef.data.object.sha,
              });
              core.info(`Created branch: ${branch}`);
            }

      - name: Label issue as dispatched
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const labels = ['dispatched'];
            await github.rest.issues.addLabels({ owner, repo, issue_number, labels });

      - name: Comment branch and command usage
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.issue.number;
            const branch = '${{ steps.vars.outputs.branch }}';
            const body = [
              `Issue dispatched to branch: \`${branch}\``,
              '',
              'Next:',
              `1. Push implementation commits to \`${branch}\``,
              '2. Add issue label `auto-pr` to open an automated PR',
              '',
              'Manual trigger command:',
              '- Comment `/dispatch` on this issue',
            ].join('\n');
            await github.rest.issues.createComment({ owner, repo, issue_number, body });
